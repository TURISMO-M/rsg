<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub - Snake Menu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        .hub-back-nav {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 25;
            background-color: var(--surface-color);
            color: var(--text-color);
            border: 2px solid var(--button-bg);
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .user-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 13px;
            font-weight: bold;
            background-color: var(--surface-color);
            color: var(--accent-color);
            padding: 8px 12px;
            border-radius: 20px;
            border: 2px solid var(--button-bg);
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 20;
            display: none;
        }

        .hub-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--accent-color);
            text-shadow: 0 0 12px var(--shadow);
            margin-bottom: 25px;
            text-align: center;
        }

        .hub-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 300px;
            z-index: 10;
        }
    </style>
</head>
<body class="dark-theme">

    <div class="user-badge" id="user-badge">Guest</div>

    <div class="hub-container">
        <div class="hub-title">SNAKE ARENA</div>
        
        <button class="menu-btn resume" id="play-game-btn">Play Game</button>
        <button class="menu-btn leaderboard" id="hub-leaderboard-btn">Leaderboard</button>
        <button class="menu-btn restart" id="hub-settings-btn">Settings</button>
    </div>

    <div class="bottom-ambient-glow"></div>

    <div id="leaderboardMenu" class="pause-overlay">
        <div class="pause-title">GLOBAL RECORDS</div>
        <div class="leaderboard-list" id="leaderboard-list">
            <div class="leaderboard-itemLoading">Fetching live records...</div>
        </div>
        <button class="menu-btn exit" id="close-leaderboard-btn">Close</button>
    </div>

    <div id="hubSettingsMenu" class="pause-overlay">
        <div class="pause-title">SETTINGS</div>
        
        <div class="setting-row">
            <label>Control Layout</label>
            <select id="hub-control-type">
                <option value="dpad">Tactile D-Pad</option>
                <option value="swipe">Gesture Swipe</option>
            </select>
        </div>

        <div class="setting-row">
            <label>Control Scale</label>
            <input type="range" id="hub-control-scale" min="0.7" max="1.4" step="0.1" value="1.0">
        </div>

        <div class="setting-row">
            <label>Vertical Position</label>
            <input type="range" id="hub-control-y" min="0" max="60" step="5" value="15">
        </div>

        <div class="setting-row" style="margin-top: 10px;">
            <button class="icon-btn" id="hub-theme-toggle" style="width: 100%;">Toggle Theme 🌓</button>
        </div>

        <button class="menu-btn resume" id="close-hub-settings-btn" style="margin-top: 15px;">Save & Back</button>
    </div>

    <script>
        const playBtn = document.getElementById('play-game-btn');
        const hubSettingsBtn = document.getElementById('hub-settings-btn');
        const hubSettingsMenu = document.getElementById('hubSettingsMenu');
        const closeHubSettingsBtn = document.getElementById('close-hub-settings-btn');
        const hubControlType = document.getElementById('hub-control-type');
        const hubControlScale = document.getElementById('hub-control-scale');
        const hubControlY = document.getElementById('hub-control-y');
        const hubThemeToggle = document.getElementById('hub-theme-toggle');

        const leaderboardMenu = document.getElementById('leaderboardMenu');
        const leaderboardList = document.getElementById('leaderboard-list');

        function loadGlobalSettings() {
            hubControlType.value = localStorage.getItem('control_type') || 'dpad';
            hubControlScale.value = localStorage.getItem('control_scale') || '1.0';
            hubControlY.value = localStorage.getItem('control_y') || '15';
            
            const savedTheme = localStorage.getItem('theme') || 'dark-theme';
            document.body.className = savedTheme;
        }

        playBtn.addEventListener('click', () => {
            window.location.href = "game.html";
        });

        hubSettingsBtn.addEventListener('click', () => {
            loadGlobalSettings();
            hubSettingsMenu.style.display = "flex";
        });

        closeHubSettingsBtn.addEventListener('click', () => {
            localStorage.setItem('control_type', hubControlType.value);
            localStorage.setItem('control_scale', hubControlScale.value);
            localStorage.setItem('control_y', hubControlY.value);
            hubSettingsMenu.style.display = "none";
        });

        hubThemeToggle.addEventListener('click', () => {
            const body = document.body;
            if (body.classList.contains('dark-theme')) {
                body.className = 'light-theme';
                localStorage.setItem('theme', 'light-theme');
            } else {
                body.className = 'dark-theme';
                localStorage.setItem('theme', 'dark-theme');
            }
        });

        function showLeaderboard() {
            leaderboardMenu.style.display = "flex";
            leaderboardList.innerHTML = '<div class="leaderboard-itemLoading">Fetching live records...</div>';
            setTimeout(() => {
                leaderboardList.innerHTML = '<div class="leaderboard-item"><span>1. PlayerOne</span><span>120</span></div><div class="leaderboard-item"><span>2. GamerPro</span><span>90</span></div>';
            }, 600);
        }

        document.getElementById('hub-leaderboard-btn').addEventListener('click', showLeaderboard);
        document.getElementById('close-leaderboard-btn').addEventListener('click', () => {
            leaderboardMenu.style.display = "none";
        });

        loadGlobalSettings();
    </script>
</body>
</html>
