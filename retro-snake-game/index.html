<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub - Snake Menu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        .hub-back-nav {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 25;
            background-color: var(--surface-color);
            color: var(--text-color);
            border: 2px solid var(--button-bg);
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .user-badge {
            position: absolute;
            top: 15px;
            left: 95px;
            font-size: 13px;
            font-weight: bold;
            background-color: var(--surface-color);
            color: var(--accent-color);
            padding: 8px 12px;
            border-radius: 20px;
            border: 2px solid var(--button-bg);
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 20;
            display: none;
        }
    </style>
</head>
<body class="dark-theme">

    <a href="../index.html" class="hub-back-nav">⬅ Hub</a>
    <div id="user-badge" class="user-badge"></div>

    <div class="settings-bar">
        <button id="open-settings-btn" class="icon-btn">⚙️ Settings</button>
    </div>

    <div class="menu-container">
        <h1 class="title">SNAKE ARENA</h1>
        <button class="menu-btn resume" id="play-btn">Play Game</button>
        <button class="menu-btn leaderboard" id="leaderboard-btn">Leaderboard</button>
        <button class="menu-btn exit" id="login-btn">Account Login</button>
    </div>

    <div class="bottom-ambient-glow"></div>

    <div id="settingsMenu" class="pause-overlay">
        <div class="pause-title">GLOBAL SETTINGS</div>
        
        <div class="setting-row">
            <label>Theme Option:</label>
            <button id="hub-theme-toggle" class="icon-btn" style="width:100%; text-align:center;">🌓 Toggle Theme</button>
        </div>

        <div class="setting-row">
            <label>Input System Type:</label>
            <select id="hub-control-type">
                <option value="dpad">On-Screen D-PAD Box</option>
                <option value="swipe">Full-Screen Touch Swipe</option>
            </select>
        </div>

        <div class="setting-row">
            <label>Controller Dimensions Scale:</label>
            <input type="range" id="hub-control-scale" min="0.6" max="1.5" step="0.05" value="1.0">
        </div>

        <div class="setting-row">
            <label>Vertical Position Move:</label>
            <input type="range" id="hub-control-y" min="0" max="150" step="5" value="15">
        </div>

        <button class="menu-btn resume" id="close-settings-btn">Save Options</button>
    </div>

    <div id="leaderboardMenu" class="pause-overlay">
        <div class="pause-title">GLOBAL RECORDS</div>
        <div class="leaderboard-list" id="leaderboard-list">
            <div class="leaderboard-itemLoading">Fetching live records...</div>
        </div>
        <button class="menu-btn exit" id="close-leaderboard-btn">Close</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "SENDER_ID",
            appId: "APP_ID"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const database = firebase.database();

        const playBtn = document.getElementById('play-btn');
        const loginBtn = document.getElementById('login-btn');
        const openSettingsBtn = document.getElementById('open-settings-btn');
        const settingsMenu = document.getElementById('settingsMenu');
        const closeSettingsBtn = document.getElementById('close-settings-btn');
        
        const hubControlType = document.getElementById('hub-control-type');
        const hubControlScale = document.getElementById('hub-control-scale');
        const hubControlY = document.getElementById('hub-control-y');
        const hubThemeToggle = document.getElementById('hub-theme-toggle');

        const leaderboardMenu = document.getElementById('leaderboardMenu');
        const leaderboardList = document.getElementById('leaderboard-list');

        function loadGlobalSettings() {
            hubControlType.value = localStorage.getItem('control_type') || 'dpad';
            hubControlScale.value = localStorage.getItem('control_scale') || '1.0';
            hubControlY.value = localStorage.getItem('control_y') || '15';
            
            const savedTheme = localStorage.getItem('theme') || 'dark-theme';
            document.body.className = savedTheme;
        }

        playBtn.addEventListener('click', () => {
            window.location.href = "game.html";
        });

        openSettingsBtn.addEventListener('click', () => {
            loadGlobalSettings();
            settingsMenu.style.display = "flex";
        });

        closeSettingsBtn.addEventListener('click', () => {
            localStorage.setItem('control_type', hubControlType.value);
            localStorage.setItem('control_scale', hubControlScale.value);
            localStorage.setItem('control_y', hubControlY.value);
            settingsMenu.style.display = "none";
        });

        hubThemeToggle.addEventListener('click', () => {
            const body = document.body;
            if (body.classList.contains('dark-theme')) {
                body.className = 'light-theme';
                localStorage.setItem('theme', 'light-theme');
            } else {
                body.className = 'dark-theme';
                localStorage.setItem('theme', 'dark-theme');
            }
        });

        document.getElementById('leaderboard-btn').addEventListener('click', () => {
            leaderboardMenu.style.display = "flex";
        });

        document.getElementById('close-leaderboard-btn').addEventListener('click', () => {
            leaderboardMenu.style.display = "none";
        });

        loadGlobalSettings();
    </script>
</body>
</html>
