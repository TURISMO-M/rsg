<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Arena</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <audio id="bg-music" src="background-music.mp3" loop></audio>

    <div class="game-header">
        <button id="top-pause-btn" class="pause-trigger-btn">⏸ Pause</button>
        <div class="score-container">
            <span id="score">Score: 0</span> | 
            <span id="high-score">Best: 0</span>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="gameCanvas" width="300" height="300"></canvas>

        <div id="pauseMenu" class="pause-overlay">
            <div class="pause-title">GAME PAUSED</div>
            <button class="menu-btn resume" id="resume-btn">Resume Game</button>
            <button class="menu-btn leaderboard" id="view-settings-btn">⚙️ Control Settings</button>
            <button class="menu-btn leaderboard" id="view-leaderboard-btn">🏆 Global Leaderboard</button>
            <button class="menu-btn restart" id="restart-btn">Restart</button>
            <button class="menu-btn exit" id="exit-btn">Exit to Hub</button>
        </div>

        <div id="gameSettingsMenu" class="pause-overlay">
            <div class="pause-title">⚙️ CONTROLS</div>
            <div class="setting-row">
                <label>Theme Option:</label>
                <button id="theme-toggle" class="icon-btn" style="width:100%; text-align:center;">🌓 Toggle Theme</button>
            </div>
            <div class="setting-row">
                <label>Input System Type:</label>
                <select id="control-type-select">
                    <option value="dpad">On-Screen D-PAD Box</option>
                    <option value="swipe">Full-Screen Touch Swipe</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Controller Dimensions Scale:</label>
                <input type="range" id="control-scale-slider" min="0.6" max="1.5" step="0.05" value="1.0">
            </div>
            <div class="setting-row">
                <label>Vertical Position Move:</label>
                <input type="range" id="control-y-slider" min="0" max="150" step="5" value="15">
            </div>
            <button class="menu-btn resume" id="close-settings-btn">Save Rules</button>
        </div>

        <div id="leaderboardMenu" class="pause-overlay">
            <div class="pause-title">🏆 GLOBAL TOP 5</div>
            <div class="leaderboard-list" id="leaderboard-list">
                <div class="leaderboard-itemLoading">Connecting...</div>
            </div>
            <button class="menu-btn exit" id="close-leaderboard-btn">Back</button>
        </div>
    </div>

    <div class="controls-wrapper" id="controls-wrapper-frame">
        <div class="controls" id="dpad-unit">
            <button class="btn" id="up-btn">▲</button>
            <button class="btn" id="left-btn">◀</button>
            <button class="btn" id="right-btn">▶</button>
            <button class="btn" id="down-btn">▼</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const pauseMenu = document.getElementById("pauseMenu");
        const leaderboardMenu = document.getElementById("leaderboardMenu");
        const leaderboardList = document.getElementById("leaderboard-list");
        const gameSettingsMenu = document.getElementById("gameSettingsMenu");
        const dpadUnit = document.getElementById("dpad-unit");
        const wrapperFrame = document.getElementById("controls-wrapper-frame");

        const controlTypeSelect = document.getElementById('control-type-select');
        const controlScaleSlider = document.getElementById('control-scale-slider');
        const controlYSlider = document.getElementById('control-y-slider');
        const themeToggle = document.getElementById('theme-toggle');

        const gridSize = 15; 
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1; 
        let dy = 0; 
        let score = 0;
        let gameInterval;
        let isPaused = false;

        let playerBest = parseInt(localStorage.getItem('snake_personal_best')) || 0;
        document.getElementById("high-score").innerText = "Best: " + playerBest;

        // Background Music Control
        const bgMusic = document.getElementById("bg-music");
        let musicStarted = false;

        function startMusic() {
            if (!musicStarted) {
                bgMusic.volume = 0.35; // Sets volume to 35% (pleasant background level)
                bgMusic.play().then(() => {
                    musicStarted = true;
                    // Remove listeners once music successfully plays
                    document.removeEventListener('click', startMusic);
                    document.removeEventListener('keydown', startMusic);
                    document.removeEventListener('touchstart', startMusic);
                }).catch(err => {
                    console.log("Audio context waiting for user action...");
                });
            }
        }

        // Play the music as soon as the user touches/clicks anywhere or uses controls
        document.addEventListener('click', startMusic);
        document.addEventListener('keydown', startMusic);
        document.addEventListener('touchstart', startMusic);

        function refreshControllerDesign() {
            document.body.className = localStorage.getItem('theme') || 'dark-theme';
            const mode = localStorage.getItem('control_type') || 'dpad';
            const scale = localStorage.getItem('control_scale') || '1.0';
            const spacingY = localStorage.getItem('control_y') || '15';

            if (mode === 'swipe') {
                wrapperFrame.style.display = 'none';
            } else {
                wrapperFrame.style.display = 'flex';
                wrapperFrame.style.marginTop = spacingY + 'px';
                dpadUnit.style.transform = `scale(${scale})`;
            }
        }

        // Fresh configuration linked below
        const firebaseConfig = {
            apiKey: "AIzaSyCvHb-UwPMP8QKaaAswN_pnICOCiS1VjPA",
            authDomain: "snake-arcade-e8b15.firebaseapp.com",
            databaseURL: "https://snake-arcade-e8b15-default-rtdb.firebaseio.com",
            projectId: "snake-arcade-e8b15",
            storageBucket: "snake-arcade-e8b15.firebasestorage.app",
            messagingSenderId: "854659297329",
            appId: "1:854659297329:web:3392f6f1487de3ff5ba510",
            measurementId: "G-0NQVJERB3J"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        function fetchGlobalScores() {
            leaderboardList.innerHTML = '<div class="leaderboard-itemLoading">Loading...</div>';
            database.ref('scores').orderByChild('score').limitToLast(5).once('value', snapshot => {
                leaderboardList.innerHTML = "";
                let players = [];
                snapshot.forEach(child => { players.push({uid: child.key, ...child.val()}); });
                players.reverse();

                players.forEach((player, idx) => {
                    const item = document.createElement("div");
                    item.className = "leaderboard-item";
                    if (auth.currentUser && player.uid === auth.currentUser.uid) item.classList.add("current-player");
                    item.innerHTML = `<span>${idx + 1}. ${player.name}</span><span>${player.score}</span>`;
                    leaderboardList.appendChild(item);
                });
            });
        }

        function saveScoreToDatabase(newScore) {
            const user = auth.currentUser;
            if (user) {
                database.ref('scores/' + user.uid).set({ name: user.displayName, score: newScore });
            }
        }

        function handleGameEnd() {
            alert("Game Over! Score: " + score);
            if (score > playerBest) {
                playerBest = score;
                localStorage.setItem('snake_personal_best', playerBest);
                document.getElementById("high-score").innerText = "Best: " + playerBest;
                saveScoreToDatabase(playerBest);
            }
            resetGame();
        }

        function drawGame() {
            if (isPaused) return; 
            updateSnakePosition();
            if (checkGameOver()) { handleGameEnd(); return; }
            checkFoodCollision();
            clearCanvas();
            drawFood();
            drawSnake();
            gameInterval = setTimeout(drawGame, 140);
        }

        function clearCanvas() {
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--surface-color').trim() || "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--accent-color').trim() || "#00ff00"; 
            for(let i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 1, gridSize - 1);
            }
        }

        function drawFood() {
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--danger-color').trim() || "#ff0000"; 
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);
        }

        function updateSnakePosition() {
            let nextX = snake[0].x + dx;
            let nextY = snake[0].y + dy;
            if (nextX < 0) nextX = tileCount - 1;
            if (nextX >= tileCount) nextX = 0;
            if (nextY < 0) nextY = tileCount - 1;
            if (nextY >= tileCount) nextY = 0;
            snake.unshift({ x: nextX, y: nextY });
            snake.pop();
        }

        function checkFoodCollision() {
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                document.getElementById("score").innerText = "Score: " + score;
                generateFood();
                snake.push({}); 
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function checkGameOver() {
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                clearTimeout(gameInterval);
                pauseMenu.style.display = "flex";
            } else {
                pauseMenu.style.display = "none";
                leaderboardMenu.style.display = "none";
                gameSettingsMenu.style.display = "none";
                drawGame();
            }
        }

        function resetGame() {
            clearTimeout(gameInterval);
            snake = [{ x: 10, y: 10 }];
            dx = 1; dy = 0; score = 0;
            document.getElementById("score").innerText = "Score: " + score;
            generateFood();
            isPaused = false;
            pauseMenu.style.display = "none";
            leaderboardMenu.style.display = "none";
            gameSettingsMenu.style.display = "none";
            drawGame();
        }

        function changeDirection(dir) {
            if (isPaused) return; 
            if (dir === 'UP' && dy !== 1) { dx = 0; dy = -1; }
            if (dir === 'DOWN' && dy !== -1) { dx = 0; dy = 1; }
            if (dir === 'LEFT' && dx !== 1) { dx = -1; dy = 0; }
            if (dir === 'RIGHT' && dx !== -1) { dx = 1; dy = 0; }
        }

        window.addEventListener("keydown", e => {
            if (e.key === "Escape" || e.key === " ") togglePause();
            if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") changeDirection('UP');
            if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") changeDirection('DOWN');
            if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") changeDirection('LEFT');
            if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") changeDirection('RIGHT');
        });

        let touchStartX = 0;
        let touchStartY = 0;

        window.addEventListener('touchstart', e => {
            if(localStorage.getItem('control_type') !== 'swipe') return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: true});

        window.addEventListener('touchend', e => {
            if(localStorage.getItem('control_type') !== 'swipe') return;
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;
            
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if(Math.abs(diffX) > 30) {
                    if (diffX > 0) changeDirection('RIGHT');
                    else changeDirection('LEFT');
                }
            } else {
                if(Math.abs(diffY) > 30) {
                    if (diffY > 0) changeDirection('DOWN');
                    else changeDirection('UP');
                }
            }
        }, {passive: true});

        function bindButton(id, action) {
            const el = document.getElementById(id);
            el.addEventListener("touchstart", (e) => { 
                e.preventDefault(); 
                changeDirection(action);
            }, {passive: false});
            el.addEventListener("mousedown", () => { changeDirection(action); });
        }

        bindButton("up-btn", "UP");
        bindButton("down-btn", "DOWN");
        bindButton("left-btn", "LEFT");
        bindButton("right-btn", "RIGHT");
        document.getElementById("top-pause-btn").addEventListener("click", togglePause);
        document.getElementById("resume-btn").addEventListener("click", togglePause);

        document.getElementById("view-leaderboard-btn").addEventListener("click", () => {
            pauseMenu.style.display = "none";
            leaderboardMenu.style.display = "flex";
            fetchGlobalScores();
        });
        document.getElementById("close-leaderboard-btn").addEventListener("click", () => {
            leaderboardMenu.style.display = "none";
            pauseMenu.style.display = "flex";
        });

        document.getElementById("view-settings-btn").addEventListener("click", () => {
            pauseMenu.style.display = "none";
            controlTypeSelect.value = localStorage.getItem('control_type') || 'dpad';
            controlScaleSlider.value = localStorage.getItem('control_scale') || '1.0';
            controlYSlider.value = localStorage.getItem('control_y') || '15';
            gameSettingsMenu.style.display = "flex";
        });

        themeToggle.addEventListener('click', () => {
            const body = document.body;
            if (body.classList.contains('dark-theme')) {
                body.className = 'light-theme';
                localStorage.setItem('theme', 'light-theme');
            } else {
                body.className = 'dark-theme';
                localStorage.setItem('theme', 'dark-theme');
            }
        });

        document.getElementById("close-settings-btn").addEventListener("click", () => {
            localStorage.setItem('control_type', controlTypeSelect.value);
            localStorage.setItem('control_scale', controlScaleSlider.value);
            localStorage.setItem('control_y', controlYSlider.value);
            refreshControllerDesign();
            gameSettingsMenu.style.display = "none";
            pauseMenu.style.display = "flex";
        });

        document.getElementById("restart-btn").addEventListener("click", () => {
            if (confirm("Restart game?")) resetGame();
        });
        document.getElementById("exit-btn").addEventListener("click", () => {
            window.location.href = "index.html";
        });

        refreshControllerDesign();
        generateFood();
        drawGame();
    </script>
</body>
</html>
