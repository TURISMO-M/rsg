<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Arena</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="game-header">
        <button id="top-pause-btn" class="pause-trigger-btn">⏸ Pause</button>
        <div class="score-container">
            <span id="score">Score: 0</span> | 
            <span id="high-score">Best: 0</span>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="gameCanvas" width="300" height="300"></canvas>

        <div id="pauseMenu" class="pause-overlay">
            <div class="pause-title">GAME PAUSED</div>
            <button class="menu-btn resume" id="resume-btn">Resume Game</button>
            <button class="menu-btn leaderboard" id="view-leaderboard-btn">🏆 Global Leaderboard</button>
            <button class="menu-btn restart" id="restart-btn">Restart</button>
            <button class="menu-btn exit" id="exit-btn">Exit to Hub</button>
        </div>

        <div id="leaderboardMenu" class="pause-overlay">
            <div class="pause-title">🏆 GLOBAL TOP 5</div>
            <div class="leaderboard-list" id="leaderboard-list">
                <div class="leaderboard-itemLoading">Connecting to live scores...</div>
            </div>
            <button class="menu-btn exit" id="close-leaderboard-btn">Back</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="up-btn">▲</button>
        <button class="btn" id="left-btn">◀</button>
        <button class="btn" id="right-btn">▶</button>
        <button class="btn" id="down-btn">▼</button>
    </div>

    <script>
        document.body.className = localStorage.getItem('theme') || 'dark-theme';

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const pauseMenu = document.getElementById("pauseMenu");
        const leaderboardMenu = document.getElementById("leaderboardMenu");
        const leaderboardList = document.getElementById("leaderboard-list");

        const gridSize = 15; 
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1; 
        let dy = 0; 
        let score = 0;
        let gameInterval;
        let isPaused = false;

        // --- NICKNAME & HIGH SCORE LOCAL STORAGE ---
        let playerBest = parseInt(localStorage.getItem('snake_personal_best')) || 0;
        document.getElementById("high-score").innerText = "Best: " + playerBest;

        let playerNickname = localStorage.getItem('snake_nickname');
        if (!playerNickname) {
            playerNickname = prompt("Enter a nickname for the web leaderboards:", "Player_" + Math.floor(Math.random()*900 + 100));
            if (!playerNickname || playerNickname.trim() === "") playerNickname = "Anonymous";
            localStorage.setItem('snake_nickname', playerNickname.trim());
        }

        // --- LIVE REAL-TIME DATABASE CONFIG ---
        // Generates a unique user ID so scores updates don't clash
        let playerUid = localStorage.getItem('snake_uid');
        if (!playerUid) {
            playerUid = 'user_' + Math.random().toString(36).substring(2, 11);
            localStorage.setItem('snake_uid', playerUid);
        }

        // Free public testing bucket bucket on KVDB.io
        const DB_URL = "https://kvdb.io/2dCPg2d21j3ZgT4xWbSgPq/snake_scores";

        // Fetch real database records from the internet
        async function fetchGlobalScores() {
            try {
                leaderboardList.innerHTML = '<div class="leaderboard-itemLoading">Loading live ranks...</div>';
                const response = await fetch(DB_URL);
                if (!response.ok) throw new Error("Database empty");
                const allData = await response.json();
                
                // allData is expected to be an object: { "user_abc": {name: "XYZ", score: 100} }
                let scoreArray = Object.values(allData);
                
                // Sort absolute highest scores first
                scoreArray.sort((a, b) => b.score - a.score);

                leaderboardList.innerHTML = "";
                if (scoreArray.length === 0) {
                    leaderboardList.innerHTML = '<div class="leaderboard-itemLoading">No scores recorded yet!</div>';
                    return;
                }

                scoreArray.slice(0, 5).forEach((entry, index) => {
                    const item = document.createElement("div");
                    item.className = "leaderboard-item";
                    if (entry.name === playerNickname) item.classList.add("current-player");
                    item.innerHTML = `<span>${index + 1}. ${entry.name}</span><span>${entry.score}</span>`;
                    leaderboardList.appendChild(item);
                });
            } catch (err) {
                // If bucket is blank or down, safely display our current status
                leaderboardList.innerHTML = `
                    <div class="leaderboard-item current-player"><span>1. ${playerNickname}</span><span>${playerBest}</span></div>
                    <div class="leaderboard-itemLoading" style="font-size:11px;">(Database empty or initialization required)</div>
                `;
            }
        }

        // Save high score to the live network
        async function saveScoreToDatabase(newScore) {
            try {
                // 1. Fetch current status
                let currentDbState = {};
                try {
                    const res = await fetch(DB_URL);
                    if (res.ok) currentDbState = await res.json();
                } catch(e){}

                // 2. Set or overwrite only this player's data entry slot
                currentDbState[playerUid] = {
                    name: playerNickname,
                    score: newScore
                };

                // 3. Save full bundle back up to the web server
                await fetch(DB_URL, {
                    method: 'POST',
                    body: JSON.stringify(currentDbState),
                    headers: { 'Content-Type': 'application/json' }
                });
            } catch (e) {
                console.log("Network sync deferred:", e);
            }
        }

        function handleGameEnd() {
            alert("Game Over! Score: " + score);
            
            if (score > playerBest) {
                playerBest = score;
                localStorage.setItem('snake_personal_best', playerBest);
                document.getElementById("high-score").innerText = "Best: " + playerBest;
                alert("🎉 New Personal Record!");
                
                // Stream live to web database
                saveScoreToDatabase(playerBest);
            }
            resetGame();
        }

        function drawGame() {
            if (isPaused) return; 

            updateSnakePosition();
            if (checkGameOver()) {
                handleGameEnd();
                return;
            }
            checkFoodCollision();
            clearCanvas();
            drawFood();
            drawSnake();
            gameInterval = setTimeout(drawGame, 140);
        }

        function clearCanvas() {
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--surface-color').trim() || "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--accent-color').trim() || "#00ff00"; 
            for(let i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 1, gridSize - 1);
            }
        }

        function drawFood() {
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--danger-color').trim() || "#ff0000"; 
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);
        }

        function updateSnakePosition() {
            let nextX = snake[0].x + dx;
            let nextY = snake[0].y + dy;

            if (nextX < 0) nextX = tileCount - 1;
            if (nextX >= tileCount) nextX = 0;
            if (nextY < 0) nextY = tileCount - 1;
            if (nextY >= tileCount) nextY = 0;

            const head = { x: nextX, y: nextY };
            snake.unshift(head);
            snake.pop();
        }

        function checkFoodCollision() {
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                document.getElementById("score").innerText = "Score: " + score;
                generateFood();
                snake.push({}); 
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function checkGameOver() {
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                    return true;
                }
            }
            return false;
        }

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                clearTimeout(gameInterval);
                pauseMenu.style.display = "flex";
            } else {
                pauseMenu.style.display = "none";
                leaderboardMenu.style.display = "none";
                drawGame();
            }
        }

        function resetGame() {
            clearTimeout(gameInterval);
            snake = [{ x: 10, y: 10 }];
            dx = 1; dy = 0; score = 0;
            document.getElementById("score").innerText = "Score: " + score;
            generateFood();
            isPaused = false;
            pauseMenu.style.display = "none";
            leaderboardMenu.style.display = "none";
            drawGame();
        }

        function changeDirection(dir) {
            if (isPaused) return; 
            if (dir === 'UP' && dy !== 1) { dx = 0; dy = -1; }
            if (dir === 'DOWN' && dy !== -1) { dx = 0; dy = 1; }
            if (dir === 'LEFT' && dx !== 1) { dx = -1; dy = 0; }
            if (dir === 'RIGHT' && dx !== -1) { dx = 1; dy = 0; }
        }

        window.addEventListener("keydown", e => {
            if (e.key === "Escape" || e.key === " ") {
                togglePause();
            }
            if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") changeDirection('UP');
            if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") changeDirection('DOWN');
            if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") changeDirection('LEFT');
            if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") changeDirection('RIGHT');
        });

        function bindButton(id, action) {
            const el = document.getElementById(id);
            el.addEventListener("touchstart", (e) => { 
                e.preventDefault(); 
                if (typeof action === 'string') changeDirection(action);
                else action();
            }, {passive: false});
            
            el.addEventListener("mousedown", (e) => { 
                if (typeof action === 'string') changeDirection(action);
                else action();
            });
        }

        bindButton("up-btn", "UP");
        bindButton("down-btn", "DOWN");
        bindButton("left-btn", "LEFT");
        bindButton("right-btn", "RIGHT");
        bindButton("top-pause-btn", togglePause);

        document.getElementById("resume-btn").addEventListener("click", togglePause);
        
        document.getElementById("view-leaderboard-btn").addEventListener("click", () => {
            pauseMenu.style.display = "none";
            leaderboardMenu.style.display = "flex";
            fetchGlobalScores();
        });

        document.getElementById("close-leaderboard-btn").addEventListener("click", () => {
            leaderboardMenu.style.display = "none";
            pauseMenu.style.display = "flex";
        });
        
        document.getElementById("restart-btn").addEventListener("click", () => {
            if (confirm("Are you sure you want to Restart the Game?")) {
                resetGame();
            }
        });

        document.getElementById("exit-btn").addEventListener("click", () => {
            window.location.href = "index.html";
        });

        generateFood();
        drawGame();
    </script>
</body>
</html>
