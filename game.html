<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Game</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 10px;
        }
        #score {
            font-size: 24px;
            margin-bottom: 20px;
        }
        canvas {
            border: 4px solid #333;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
        .back-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <h1>Snake Game</h1>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <a href="index.html" class="back-btn">Go Back Home</a>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1; // horizontal velocity
        let dy = 0; // vertical velocity
        let score = 0;

        // Main game loop
        function drawGame() {
            updateSnakePosition();
            
            if (checkGameOver()) {
                alert("Game Over! Final Score: " + score);
                resetGame();
                return;
            }

            checkFoodCollision();
            clearCanvas();
            drawFood();
            drawSnake();
            
            setTimeout(drawGame, 100); // Game speed (100ms per frame)
        }

        function clearCanvas() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "#00ff00"; // Green snake
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function drawFood() {
            ctx.fillStyle = "#ff0000"; // Red food
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function updateSnakePosition() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);
            snake.pop();
        }

        function checkFoodCollision() {
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                document.getElementById("score").innerText = "Score: " + score;
                generateFood();
            } else {
                // If we didn't eat food, snake stays same size (handled by pop in update position)
            }
        }

        // Overriding the pop behavior when food is eaten
        if (snake[0].x === food.x && snake[0].y === food.y) {
            score += 10;
            document.getElementById("score").innerText = "Score: " + score;
            generateFood();
            // Grow snake by pushing a placeholder tail piece
            snake.push({}); 
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function checkGameOver() {
            // Wall collisions
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }
            // Self collisions
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                    return true;
                }
            }
            return false;
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 1;
            dy = 0;
            score = 0;
            document.getElementById("score").innerText = "Score: " + score;
            generateFood();
            drawGame();
        }

        // Listen for Arrow Keys
        window.addEventListener("keydown", e => {
            switch (e.key) {
                case "ArrowUp":
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case "ArrowDown":
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case "ArrowLeft":
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case "ArrowRight":
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        });

        generateFood();
        drawGame();
    </script>
</body>
</html>
