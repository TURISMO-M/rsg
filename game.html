<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 5px;
            box-sizing: border-box;
            overflow: hidden; 
            touch-action: none;
        }

        /* Scaled down text to save vertical space on short phones */
        h1 {
            margin: 2px 0;
            font-size: 20px;
        }

        #score {
            font-size: 18px;
            margin-bottom: 5px;
        }

        /* Shrinks the canvas area slightly on short screens so buttons fit */
        .canvas-container {
            width: 100%;
            max-width: 280px; 
            aspect-ratio: 1 / 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            border: 3px solid #333;
            background-color: #000;
            display: block;
        }

        /* Compact Mobile Controller Layout */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 8px;
            width: 160px;
            height: 160px;
            margin-top: 10px;
        }

        .btn {
            background-color: #333;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation; 
        }

        .btn:active {
            background-color: #00ff00;
            color: black;
        }

        #up-btn    { grid-column: 2; grid-row: 1; }
        #left-btn  { grid-column: 1; grid-row: 2; }
        #right-btn { grid-column: 3; grid-row: 2; }
        #down-btn  { grid-column: 2; grid-row: 3; }

        @media (min-width: 768px) {
            .controls { display: none; }
            .canvas-container { max-width: 400px; }
        }
    </style>
</head>
<body>

    <h1>Snake Game</h1>
    <div id="score">Score: 0</div>
    
    <div class="canvas-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div class="controls">
        <button class="btn" id="up-btn">▲</button>
        <button class="btn" id="left-btn">◀</button>
        <button class="btn" id="right-btn">▶</button>
        <button class="btn" id="down-btn">▼</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1; 
        let dy = 0; 
        let score = 0;
        let gameInterval;

        function drawGame() {
            updateSnakePosition();
            if (checkGameOver()) {
                alert("Game Over! Score: " + score);
                resetGame();
                return;
            }
            checkFoodCollision();
            clearCanvas();
            drawFood();
            drawSnake();
            gameInterval = setTimeout(drawGame, 130);
        }

        function clearCanvas() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "#00ff00"; 
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function drawFood() {
            ctx.fillStyle = "#ff0000"; 
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function updateSnakePosition() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);
            snake.pop();
        }

        function checkFoodCollision() {
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                document.getElementById("score").innerText = "Score: " + score;
                generateFood();
                snake.push({}); 
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function checkGameOver() {
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) return true;
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function resetGame() {
            clearTimeout(gameInterval);
            snake = [{ x: 10, y: 10 }];
            dx = 1; dy = 0; score = 0;
            document.getElementById("score").innerText = "Score: " + score;
            generateFood();
            drawGame();
        }

        function changeDirection(dir) {
            if (dir === 'UP' && dy !== 1) { dx = 0; dy = -1; }
            if (dir === 'DOWN' && dy !== -1) { dx = 0; dy = 1; }
            if (dir === 'LEFT' && dx !== 1) { dx = -1; dy = 0; }
            if (dir === 'RIGHT' && dx !== -1) { dx = 1; dy = 0; }
        }

        window.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") changeDirection('UP');
            if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") changeDirection('DOWN');
            if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") changeDirection('LEFT');
            if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") changeDirection('RIGHT');
        });

        document.getElementById("up-btn").addEventListener("pointerdown", () => changeDirection('UP'));
        document.getElementById("down-btn").addEventListener("pointerdown", () => changeDirection('DOWN'));
        document.getElementById("left-btn").addEventListener("pointerdown", () => changeDirection('LEFT'));
        document.getElementById("right-btn").addEventListener("pointerdown", () => changeDirection('RIGHT'));

        generateFood();
        drawGame();
    </script>
</body>
</html>
