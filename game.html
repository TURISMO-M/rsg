<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 5px;
            box-sizing: border-box;
            overflow: hidden; 
            touch-action: none;
        }

        h1 {
            margin: 2px 0;
            font-size: 20px;
        }

        #score {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .canvas-container {
            width: 90vw;
            max-width: 300px; 
            margin: 0 auto;
        }

        /* Fixed canvas dimensions via CSS scaling for absolute reliability */
        canvas {
            border: 3px solid #333;
            background-color: #000;
            display: block;
            width: 100%;
            height: auto;
        }

        /* Classic block controller layout for maximum mobile compatibility */
        .controls {
            width: 160px;
            height: 160px;
            margin-top: 15px;
            position: relative;
        }

        .btn {
            background-color: #333;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 22px;
            position: absolute;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation; 
        }

        .btn:active {
            background-color: #00ff00;
            color: black;
        }

        /* Absolute positioning guarantees buttons stay perfectly formed on any screen height */
        #up-btn    { top: 0; left: 55px; }
        #left-btn  { top: 55px; left: 0; }
        #right-btn { top: 55px; right: 0; }
        #down-btn  { bottom: 0; left: 55px; }

        @media (min-width: 768px) {
            .controls { display: none; }
            .canvas-container { max-width: 400px; }
        }
    </style>
</head>
<body>

    <h1>Snake Game</h1>
    <div id="score">Score: 0</div>
    
    <div class="canvas-container">
        <canvas id="gameCanvas" width="300" height="300"></canvas>
    </div>

    <div class="controls">
        <button class="btn" id="up-btn">▲</button>
        <button class="btn" id="left-btn">◀</button>
        <button class="btn" id="right-btn">▶</button>
        <button class="btn" id="down-btn">▼</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 15; 
        const tileCount = canvas.width / gridSize; // 300 / 15 = 20 tiles

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1; 
        let dy = 0; 
        let score = 0;
        let gameInterval;

        function drawGame() {
            updateSnakePosition();
            if (checkGameOver()) {
                alert("Game Over! Score: " + score);
                resetGame();
                return;
            }
            checkFoodCollision();
            clearCanvas();
            drawFood();
            drawSnake();
            gameInterval = setTimeout(drawGame, 140);
        }

        function clearCanvas() {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "#00ff00"; 
            for(let i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 1, gridSize - 1);
            }
        }

        function drawFood() {
            ctx.fillStyle = "#ff0000"; 
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);
        }

        function updateSnakePosition() {
            let nextX = snake[0].x + dx;
            let nextY = snake[0].y + dy;

            if (nextX < 0) nextX = tileCount - 1;
            if (nextX >= tileCount) nextX = 0;
            if (nextY < 0) nextY = tileCount - 1;
            if (nextY >= tileCount) nextY = 0;

            const head = { x: nextX, y: nextY };
            snake.unshift(head);
            snake.pop();
        }

        function checkFoodCollision() {
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                document.getElementById("score").innerText = "Score: " + score;
                generateFood();
                snake.push({}); 
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function checkGameOver() {
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                    return true;
                }
            }
            return false;
        }

        function resetGame() {
            clearTimeout(gameInterval);
            snake = [{ x: 10, y: 10 }];
            dx = 1; dy = 0; score = 0;
            document.getElementById("score").innerText = "Score: " + score;
            generateFood();
            drawGame();
        }

        function changeDirection(dir) {
            if (dir === 'UP' && dy !== 1) { dx = 0; dy = -1; }
            if (dir === 'DOWN' && dy !== -1) { dx = 0; dy = 1; }
            if (dir === 'LEFT' && dx !== 1) { dx = -1; dy = 0; }
            if (dir === 'RIGHT' && dx !== -1) { dx = 1; dy = 0; }
        }

        // Keyboard support
        window.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" || e.key.toLowerCase() === "w") changeDirection('UP');
            if (e.key === "ArrowDown" || e.key.toLowerCase() === "s") changeDirection('DOWN');
            if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") changeDirection('LEFT');
            if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") changeDirection('RIGHT');
        });

        // Universal mobile touch listeners (supports older mobile devices perfectly)
        function bindButton(id, direction) {
            const el = document.getElementById(id);
            el.addEventListener("touchstart", (e) => { e.preventDefault(); changeDirection(direction); }, {passive: false});
            el.addEventListener("mousedown", (e) => { changeDirection(direction); });
        }

        bindButton("up-btn", "UP");
        bindButton("down-btn", "DOWN");
        bindButton("left-btn", "LEFT");
        bindButton("right-btn", "RIGHT");

        generateFood();
        drawGame();
    </script>
</body>
</html>
