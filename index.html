<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0a0a0a;
            color: #39ff14; /* Neon Green */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(rgba(0, 30, 0, 0.5), #000),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100%, 100% 4px, 6px 100%;
        }

        /* Header / Title Styles */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #39ff14;
            text-shadow: 
                0 0 5px #39ff14,
                0 0 10px #39ff14,
                0 0 20px #1f8b0c,
                0 0 40px #1f8b0c;
            animation: flicker 2s infinite alternate;
        }

        p {
            color: #888;
            font-size: 1.2rem;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* Horizontal Button Container */
        .btn-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Arcade Button Styles */
        .arcade-btn {
            display: inline-block;
            text-decoration: none;
            color: #39ff14;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 15px 35px;
            border: 3px solid #39ff14;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 
                inset 0 0 10px rgba(57, 255, 20, 0.2),
                0 0 10px rgba(57, 255, 20, 0.2);
        }

        /* Button Hover Effects */
        .arcade-btn:hover {
            color: #0a0a0a;
            background-color: #39ff14;
            box-shadow: 
                0 0 20px #39ff14,
                0 0 40px #39ff14;
            transform: translateY(-5px);
        }

        .arcade-btn:active {
            transform: translateY(-1px);
            box-shadow: 0 0 10px #39ff14;
        }

        /* Neon Flicker Animation */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 
                    0 0 5px #39ff14,
                    0 0 10px #39ff14,
                    0 0 20px #1f8b0c,
                    0 0 40px #1f8b0c;
            }
            20%, 24%, 55% {        
                text-shadow: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Arcade Hub</h1>
        <p>Select your game insert coin to play</p>
    </header>

    <div class="btn-container">
        <a href="https://turismo-m.github.io/arcade_hub/retro_snake_game" class="arcade-btn">
            Retro Snake Game
        </a>
        <a href="https://turismo-m.github.io/arcade_hub/labyrinth_game" class="arcade-btn">
            Labyrinth Game
        </a>
    </div>

</body>
</html>
