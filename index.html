<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Arcade Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme"> <div class="settings-bar">
        <button id="theme-toggle" class="icon-btn">🌓 Toggle Theme</button>
    </div>

    <div class="container animate-pop">
        <h1 class="glow-text">ARCADE HUB</h1>
        <p class="subtitle">Select a game to begin your session</p>
        
        <div class="menu-actions">
            <a href="game.html" class="game-btn snake-theme">Play Snake Game</a>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        // Check for saved theme preference
        const savedTheme = localStorage.getItem('theme') || 'dark-theme';
        body.className = savedTheme;

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('dark-theme')) {
                body.classList.replace('dark-theme', 'light-theme');
                localStorage.setItem('theme', 'light-theme');
            } else {
                body.classList.replace('light-theme', 'dark-theme');
                localStorage.setItem('theme', 'dark-theme');
            }
        });
    </script>
</body>
</html>
