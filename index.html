<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #39ff14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Retro Grid Background Effect */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(57, 255, 20, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(57, 255, 20, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            pointer-events: none;
        }

        /* Container */
        .hub-container {
            text-align: center;
            z-index: 2;
            padding: 20px;
        }

        /* Header Styling */
        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 
                0 0 5px #39ff14,
                0 0 10px #39ff14,
                0 0 20px #39ff14,
                0 0 40px #1f800b;
            animation: pulse 2s infinite alternate;
        }

        p {
            color: #888;
            font-size: 1.2rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* Button Container (Horizontal Layout) */
        .button-group {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Arcade Button Styling */
        .arcade-btn {
            display: inline-block;
            text-decoration: none;
            color: #39ff14;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 15px 30px;
            border: 2px solid #39ff14;
            border-radius: 5px;
            background-color: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* Button Hover Effects */
        .arcade-btn:hover {
            color: #0a0a0a;
            background-color: #39ff14;
            box-shadow: 0 0 25px #39ff14, 0 0 50px rgba(57, 255, 20, 0.5);
            transform: translateY(-3px);
        }

        .arcade-btn:active {
            transform: translateY(1px);
            box-shadow: 0 0 15px #39ff14;
        }

        /* Title Animation */
        @keyframes pulse {
            from {
                text-shadow: 0 0 5px #39ff14, 0 0 10px #39ff14, 0 0 20px #39ff14;
            }
            to {
                text-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14, 0 0 35px #39ff14, 0 0 50px #1f800b;
            }
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1>Arcade Hub</h1>
        <p>Select your game to begin</p>
        
        <div class="button-group">
            <a href="https://turismo-m.github.io/arcade-hub/retro-snake-game" class="arcade-btn">
                Retro Snake Game
            </a>
            <a href="https://turismo-m.github.io/arcade-hub/labyrinth-game" class="arcade-btn">
                Labyrinth Game
            </a>
        </div>
    </div>

</body>
</html>
