<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* Top-Left User Display */
        .user-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 13px;
            font-weight: bold;
            background-color: var(--surface-color);
            color: var(--accent-color);
            padding: 8px 12px;
            border-radius: 20px;
            border: 2px solid var(--button-bg);
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 20;
            display: none; /* Hidden by default */
        }
    </style>
</head>
<body class="dark-theme">

    <div id="user-badge" class="user-badge"></div>

    <div class="settings-bar">
        <button id="open-settings-btn" class="icon-btn">⚙️ Settings</button>
    </div>

    <div class="container" style="margin-top: 50px;">
        <div id="auth-box" style="margin-bottom: 25px;">
            <button id="login-btn" class="menu-btn resume" style="width: 210px;">Sign in with Google</button>
            <div id="player-profile" style="display: none; font-size: 16px; font-weight: bold;">
                Welcome, <span id="player-name" style="color: var(--accent-color);">Player</span>!<br>
                <span id="personal-best" style="font-size: 14px; opacity: 0.8;">Best Score: 0</span>
                <br>
                <button id="logout-btn" style="margin-top: 12px; background: transparent; border: 1px solid var(--danger-color); color: var(--danger-color); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold;">Sign Out</button>
            </div>
        </div>

        <a href="game.html" class="game-btn">Play Snake Game</a>
        <br><br>
        <button id="hub-leaderboard-btn" class="menu-btn leaderboard" style="width: 210px; padding: 12px;">🏆 Global Leaderboard</button>
    </div>

    <div id="leaderboardMenu" class="pause-overlay" style="position: fixed;">
        <div class="pause-title">🏆 GLOBAL TOP 5</div>
        <div class="leaderboard-list" id="leaderboard-list">
            <div class="leaderboard-itemLoading">Loading profiles...</div>
        </div>
        <button class="menu-btn exit" id="close-leaderboard-btn">Back</button>
    </div>

    <div id="settingsMenu" class="pause-overlay" style="position: fixed;">
        <div class="pause-title">⚙️ GAME CONFIG</div>
        
        <div class="setting-row">
            <label>Visual Interface Mode:</label>
            <button id="theme-toggle" class="icon-btn" style="width:100%; text-align:center;">🌓 Switch Theme</button>
        </div>
        <div class="setting-row">
            <label>Input Control Mapping:</label>
            <select id="control-type-select">
                <option value="dpad">On-Screen D-PAD Box</option>
                <option value="swipe">Full-Screen Touch Swipe</option>
            </select>
        </div>
        <div class="setting-row">
            <label>Controller Dimensions (Scale):</label>
            <input type="range" id="control-scale-slider" min="0.6" max="1.5" step="0.05" value="1.0">
        </div>
        <div class="setting-row">
            <label>Vertical Position Alignment:</label>
            <input type="range" id="control-y-slider" min="0" max="150" step="5" value="15">
        </div>

        <button class="menu-btn resume" id="close-settings-btn" style="margin-top: 15px;">Save & Close</button>
    </div>

    <script>
        const body = document.body;
        const settingsMenu = document.getElementById('settingsMenu');
        const themeToggle = document.getElementById('theme-toggle');
        const controlTypeSelect = document.getElementById('control-type-select');
        const controlScaleSlider = document.getElementById('control-scale-slider');
        const controlYSlider = document.getElementById('control-y-slider');

        function loadGlobalSettings() {
            body.className = localStorage.getItem('theme') || 'dark-theme';
            controlTypeSelect.value = localStorage.getItem('control_type') || 'dpad';
            controlScaleSlider.value = localStorage.getItem('control_scale') || '1.0';
            controlYSlider.value = localStorage.getItem('control_y') || '15';
        }

        document.getElementById('open-settings-btn').addEventListener('click', () => {
            loadGlobalSettings();
            settingsMenu.style.display = 'flex';
        });

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('dark-theme')) {
                body.classList.replace('dark-theme', 'light-theme');
                localStorage.setItem('theme', 'light-theme');
            } else {
                body.classList.replace('light-theme', 'dark-theme');
                localStorage.setItem('theme', 'dark-theme');
            }
        });

        document.getElementById('close-settings-btn').addEventListener('click', () => {
            localStorage.setItem('control_type', controlTypeSelect.value);
            localStorage.setItem('control_scale', controlScaleSlider.value);
            localStorage.setItem('control_y', controlYSlider.value);
            settingsMenu.style.display = 'none';
        });

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCvHb-UwPMP8QKaaAswN_pnICOCiS1VjPA",
            authDomain: "snake-arcade-e8b15.firebaseapp.com",
            databaseURL: "https://snake-arcade-e8b15-default-rtdb.firebaseio.com",
            projectId: "snake-arcade-e8b15",
            storageBucket: "snake-arcade-e8b15.firebasestorage.app",
            messagingSenderId: "854659297329",
            appId: "1:854659297329:web:3392f6f1487de3ff5ba510",
            measurementId: "G-0NQVJERB3J"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const playerProfile = document.getElementById('player-profile');
        const playerName = document.getElementById('player-name');
        const personalBestText = document.getElementById('personal-best');
        const leaderboardMenu = document.getElementById('leaderboardMenu');
        const leaderboardList = document.getElementById('leaderboard-list');
        const userBadge = document.getElementById('user-badge');

        loginBtn.addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            auth.signInWithRedirect(provider);
        });

        logoutBtn.addEventListener('click', () => {
            auth.signOut().then(() => {
                localStorage.removeItem('snake_personal_best');
                window.location.reload();
            });
        });

        auth.getRedirectResult().then(result => {
            if (result.user) {
                console.log("Redirect login successful:", result.user.displayName);
            }
        }).catch(err => {
            console.error("Authentication Processing Error:", err.message);
        });

        // Keep watch of auth state and update UI
        auth.onAuthStateChanged(user => {
            if (user) {
                // User is Signed In
                loginBtn.style.display = 'none'; // Hide "Sign in with Google" button
                playerProfile.style.display = 'block';
                playerName.innerText = user.displayName;

                // Show top-left email badge
                userBadge.innerText = user.email;
                userBadge.style.display = 'block';

                database.ref('scores/' + user.uid).on('value', snapshot => {
                    const data = snapshot.val();
                    const record = data ? data.score : 0;
                    localStorage.setItem('snake_personal_best', record);
                    personalBestText.innerText = "Best Score: " + record;
                });
            } else {
                // User is Signed Out
                loginBtn.style.display = 'block'; // Show "Sign in with Google" button
                playerProfile.style.display = 'none';
                
                // Hide top-left email badge
                userBadge.style.display = 'none';
                userBadge.innerText = '';
            }
        });

        function showLeaderboard() {
            leaderboardMenu.style.display = "flex";
            leaderboardList.innerHTML = '<div class="leaderboard-itemLoading">Fetching live records...</div>';

            database.ref('scores').orderByChild('score').limitToLast(5).once('value', snapshot => {
                leaderboardList.innerHTML = "";
                let players = [];
                snapshot.forEach(childSnapshot => {
                    players.push({ uid: childSnapshot.key, ...childSnapshot.val() });
                });
                players.reverse();
                if (players.length === 0) {
                    leaderboardList.innerHTML = '<div class="leaderboard-itemLoading">No scores uploaded yet!</div>';
                    return;
                }
                players.forEach((player, index) => {
                    const item = document.createElement("div");
                    item.className = "leaderboard-item";
                    if (auth.currentUser && player.uid === auth.currentUser.uid) {
                        item.classList.add("current-player");
                    }
                    item.innerHTML = `<span>${index + 1}. ${player.name}</span><span>${player.score}</span>`;
                    leaderboardList.appendChild(item);
                });
            });
        }

        document.getElementById('hub-leaderboard-btn').addEventListener('click', showLeaderboard);
        document.getElementById('close-leaderboard-btn').addEventListener('click', () => {
            leaderboardMenu.style.display = "none";
        });

        loadGlobalSettings();
    </script>
</body>
</html>
