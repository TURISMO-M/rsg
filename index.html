<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="dark-theme">

    <div class="settings-bar">
        <button id="theme-toggle" class="icon-btn">🌓 Toggle Theme</button>
    </div>

    <div class="container">
        <div id="auth-box" style="margin-bottom: 25px;">
            <button id="login-btn" class="menu-btn resume" style="width: 210px;">Sign in with Google</button>
            <div id="player-profile" style="display: none; font-size: 16px; font-weight: bold;">
                Welcome, <span id="player-name" style="color: var(--accent-color);">Player</span>!<br>
                <span id="personal-best" style="font-size: 14px; opacity: 0.8;">Best Score: 0</span>
            </div>
        </div>

        <a href="game.html" class="game-btn">Play Snake Game</a>
        <br><br>
        <button id="hub-leaderboard-btn" class="menu-btn leaderboard" style="width: 210px; padding: 12px;">🏆 Global Leaderboard</button>
    </div>

    <div id="leaderboardMenu" class="pause-overlay" style="position: fixed;">
        <div class="pause-title">🏆 GLOBAL TOP 5</div>
        <div class="leaderboard-list" id="leaderboard-list">
            <div class="leaderboard-itemLoading">Loading profiles...</div>
        </div>
        <button class="menu-btn exit" id="close-leaderboard-btn">Back</button>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const savedTheme = localStorage.getItem('theme') || 'dark-theme';
        body.className = savedTheme;

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('dark-theme')) {
                body.classList.replace('dark-theme', 'light-theme');
                localStorage.setItem('theme', 'light-theme');
            } else {
                body.classList.replace('light-theme', 'dark-theme');
                localStorage.setItem('theme', 'dark-theme');
            }
        });

        // 🚨 REPLACE THIS WITH YOUR CONFIG COPIED IN STEP 3 🚨
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        const loginBtn = document.getElementById('login-btn');
        const playerProfile = document.getElementById('player-profile');
        const playerName = document.getElementById('player-name');
        const personalBestText = document.getElementById('personal-best');
        const leaderboardMenu = document.getElementById('leaderboardMenu');
        const leaderboardList = document.getElementById('leaderboard-list');

        loginBtn.addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Sign in failed: " + err.message));
        });

        auth.onAuthStateChanged(user => {
            if (user) {
                loginBtn.style.display = 'none';
                playerProfile.style.display = 'block';
                playerName.innerText = user.displayName;

                database.ref('scores/' + user.uid).on('value', snapshot => {
                    const data = snapshot.val();
                    const record = data ? data.score : 0;
                    localStorage.setItem('snake_personal_best', record);
                    personalBestText.innerText = "Best Score: " + record;
                });
            } else {
                loginBtn.style.display = 'block';
                playerProfile.style.display = 'none';
            }
        });

        function showLeaderboard() {
            leaderboardMenu.style.display = "flex";
            leaderboardList.innerHTML = '<div class="leaderboard-itemLoading">Fetching live records...</div>';

            database.ref('scores').orderByChild('score').limitToLast(5).once('value', snapshot => {
                leaderboardList.innerHTML = "";
                let players = [];
                
                snapshot.forEach(childSnapshot => {
                    players.push({ uid: childSnapshot.key, ...childSnapshot.val() });
                });
                
                players.reverse(); // Highest scores on top

                if (players.length === 0) {
                    leaderboardList.innerHTML = '<div class="leaderboard-itemLoading">No scores uploaded yet!</div>';
                    return;
                }

                players.forEach((player, index) => {
                    const item = document.createElement("div");
                    item.className = "leaderboard-item";
                    if (auth.currentUser && player.uid === auth.currentUser.uid) {
                        item.classList.add("current-player");
                    }
                    item.innerHTML = `<span>${index + 1}. ${player.name}</span><span>${player.score}</span>`;
                    leaderboardList.appendChild(item);
                });
            });
        }

        document.getElementById('hub-leaderboard-btn').addEventListener('click', showLeaderboard);
        document.getElementById('close-leaderboard-btn').addEventListener('click', () => {
            leaderboardMenu.style.display = "none";
        });
    </script>
</body>
</html>
